{% extends 'base.html' %}
{% block title %}Check In — SmartPark{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
<div class="col-md-5 col-lg-4">
  <div class="text-center mb-4">
    <div style="font-size:2rem;color:var(--sp-accent);"><i class="bi bi-p-square-fill"></i></div>
    <h4 class="fw-bold mt-2">Vehicle Check-in</h4>
    <p class="text-muted small">Enter your vehicle plate to check in</p>
  </div>
  <div class="card">
    <div class="card-body p-4">
      <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label small text-muted">Vehicle Plate</label>
        <input type="text" name="vehicle_plate" class="form-control" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-1">Check In</button>
      </form>
    </div>
  </div>
  <div class="text-center mt-3 text-muted small">For registered accounts, <a href="{% url 'register' %}" style="color:var(--sp-accent)">Sign up</a></div>
</div>
</div>
{% endblock %}
