{% extends 'base.html' %}
{% block title %}Admin Login — SmartPark{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
<div class="col-md-5 col-lg-4">
  <div class="text-center mb-4">
    <div style="font-size:2rem;color:var(--sp-accent);"><i class="bi bi-shield-lock-fill"></i></div>
    <h4 class="fw-bold mt-2">Admin Portal</h4>
    <p class="text-muted small">Administrator access only</p>
  </div>
  <div class="card">
    <div class="card-body p-4">
      {% if form.non_field_errors %}
      <div class="alert alert-danger">{{ form.non_field_errors.0 }}</div>
      {% endif %}
      <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label small text-muted">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-1">Sign In</button>
      </form>
    </div>
  </div>
  <div class="text-center mt-3"><a href="{% url 'home' %}">Back to Home</a></div>
</div>
</div>
{% endblock %}
